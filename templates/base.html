<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InfoPulse 管理后台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
        }
        .sidebar .nav-link {
            color: #adb5bd;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #495057;
        }
        .main-content {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .stat-card {
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .status-badge {
            font-size: 0.75rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h4 class="text-white">InfoPulse</h4>
                        <small class="text-muted">资讯采集管理平台</small>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
                                <i class="bi bi-speedometer2 me-2"></i>仪表盘
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/tasks' %}active{% endif %}" href="/tasks">
                                <i class="bi bi-list-task me-2"></i>任务管理
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/sources' %}active{% endif %}" href="/sources">
                                <i class="bi bi-globe me-2"></i>采集源
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/logs' %}active{% endif %}" href="/logs">
                                <i class="bi bi-journal-text me-2"></i>采集日志
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/news' %}active{% endif %}" href="/news">
                                <i class="bi bi-newspaper me-2"></i>采集数据
                            </a>
                        </li>
                    </ul>
                    <hr class="text-white">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="#" id="reloadBtn">
                                <i class="bi bi-arrow-clockwise me-2"></i>重新加载配置
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <main class="col-md-10 main-content">
                <div class="p-4">
                    {% block content %}{% endblock %}
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script>
        function showLoading() {
            $('#loadingModal').modal('show');
        }

        function hideLoading() {
            $('#loadingModal').modal('hide');
        }

        function showAlert(message, type = 'success') {
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            $('#alertContainer').html(alertHtml);
            setTimeout(() => {
                $('#alertContainer .alert').alert('close');
            }, 3000);
        }

        $(document).ready(function() {
            $('#reloadBtn').click(function(e) {
                e.preventDefault();
                if (confirm('确定要重新加载配置吗？')) {
                    showLoading();
                    $.post('/api/reload', function(data) {
                        hideLoading();
                        if (data.success) {
                            showAlert('配置重新加载成功');
                        } else {
                            showAlert('配置重新加载失败', 'danger');
                        }
                    }).fail(function() {
                        hideLoading();
                        showAlert('请求失败', 'danger');
                    });
                }
            });
        });
    </script>

    <div class="modal fade" id="loadingModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center py-4">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mb-0">处理中...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="alertContainer" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

    {% block extra_js %}{% endblock %}
</body>
</html>
