{% extends "base.html" %}

{% block title %}任务管理 - InfoPulse{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>任务管理</h2>
    <div>
        <button class="btn btn-success me-2" onclick="runAllTasks()">
            <i class="bi bi-play-fill me-2"></i>运行所有任务
        </button>
        <button class="btn btn-primary" onclick="refreshTasks()">
            <i class="bi bi-arrow-clockwise me-2"></i>刷新
        </button>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>采集源</th>
                        <th>状态</th>
                        <th>上次运行</th>
                        <th>下次运行</th>
                        <th>间隔(秒)</th>
                        <th>成功次数</th>
                        <th>失败次数</th>
                        <th>连续失败</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tasksTableBody">
                    <tr>
                        <td colspan="9" class="text-center">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="taskDetailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">任务详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="taskDetailContent">
                加载中...
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function refreshTasks() {
        $.get('/api/tasks', function(tasks) {
            let html = '';
            tasks.forEach(function(task) {
                const statusClass = getStatusBadgeClass(task.status);
                const lastRun = task.last_run ? new Date(task.last_run).toLocaleString() : '从未运行';
                const nextRun = task.next_run ? new Date(task.next_run).toLocaleString() : '-';
                const collector = task.collector_status || {};
                
                html += `
                    <tr>
                        <td><strong>${task.source_name}</strong></td>
                        <td><span class="badge ${statusClass}">${task.status}</span></td>
                        <td>${lastRun}</td>
                        <td>${nextRun}</td>
                        <td>${task.interval}</td>
                        <td>${collector.total_success || 0}</td>
                        <td>${collector.total_failure || 0}</td>
                        <td>${collector.consecutive_failures || 0}</td>
                        <td>
                            <div class="btn-group">
                                <button class="btn btn-sm btn-outline-primary" onclick="runTask('${task.source_name}')">
                                    <i class="bi bi-play-fill"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-warning" onclick="pauseTask('${task.source_name}')">
                                    <i class="bi bi-pause-fill"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-info" onclick="viewTaskDetail('${task.source_name}')">
                                    <i class="bi bi-info-circle"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            $('#tasksTableBody').html(html || '<tr><td colspan="9" class="text-center">暂无任务</td></tr>');
        });
    }

    function getStatusBadgeClass(status) {
        switch (status) {
            case 'running': return 'bg-primary';
            case 'completed': return 'bg-success';
            case 'failed': return 'bg-danger';
            case 'error': return 'bg-danger';
            case 'paused': return 'bg-warning';
            case 'scheduled': return 'bg-info';
            default: return 'bg-secondary';
        }
    }

    function runTask(sourceName) {
        $.post(`/api/tasks/${sourceName}/run`, function(data) {
            if (data.success) {
                showAlert('任务已触发');
                refreshTasks();
            } else {
                showAlert('任务触发失败', 'danger');
            }
        });
    }

    function pauseTask(sourceName) {
        $.post(`/api/tasks/${sourceName}/pause`, function(data) {
            if (data.success) {
                showAlert('任务已暂停');
                refreshTasks();
            } else {
                showAlert('任务暂停失败', 'danger');
            }
        });
    }

    function resumeTask(sourceName) {
        $.post(`/api/tasks/${sourceName}/resume`, function(data) {
            if (data.success) {
                showAlert('任务已恢复');
                refreshTasks();
            } else {
                showAlert('任务恢复失败', 'danger');
            }
        });
    }

    function viewTaskDetail(sourceName) {
        $.get(`/api/tasks/${sourceName}`, function(task) {
            let html = `
                <div class="row">
                    <div class="col-md-6">
                        <h6>基本信息</h6>
                        <table class="table table-sm">
                            <tr><td>采集源</td><td>${task.source_name}</td></tr>
                            <tr><td>状态</td><td><span class="badge ${getStatusBadgeClass(task.status)}">${task.status}</span></td></tr>
                            <tr><td>上次运行</td><td>${task.last_run ? new Date(task.last_run).toLocaleString() : '从未运行'}</td></tr>
                            <tr><td>间隔</td><td>${task.interval} 秒</td></tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <h6>统计信息</h6>
                        <table class="table table-sm">
                            <tr><td>成功次数</td><td>${task.collector_status?.total_success || 0}</td></tr>
                            <tr><td>失败次数</td><td>${task.collector_status?.total_failure || 0}</td></tr>
                            <tr><td>连续失败</td><td>${task.collector_status?.consecutive_failures || 0}</td></tr>
                            <tr><td>采集数量</td><td>${task.news_count || 0}</td></tr>
                        </table>
                    </div>
                </div>
                <h6>最近日志</h6>
                <div style="max-height: 300px; overflow-y: auto;">
            `;
            
            if (task.logs && task.logs.length > 0) {
                task.logs.forEach(function(log) {
                    const statusClass = log.status === 'success' ? 'text-success' : 'text-danger';
                    const time = new Date(log.created_at).toLocaleString();
                    html += `
                        <div class="mb-2 p-2 border-bottom">
                            <div class="d-flex justify-content-between">
                                <span class="${statusClass}">${log.status}</span>
                                <small class="text-muted">${time}</small>
                            </div>
                            <small>${log.message || ''}</small>
                        </div>
                    `;
                });
            } else {
                html += '<p class="text-muted">暂无日志</p>';
            }
            
            html += '</div>';
            $('#taskDetailContent').html(html);
            $('#taskDetailModal').modal('show');
        });
    }

    function runAllTasks() {
        $.get('/api/tasks', function(tasks) {
            tasks.forEach(function(task) {
                if (task.status !== 'running') {
                    runTask(task.source_name);
                }
            });
        });
    }

    $(document).ready(function() {
        refreshTasks();
        setInterval(refreshTasks, 10000);
    });
</script>
{% endblock %}
