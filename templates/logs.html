{% extends "base.html" %}

{% block title %}采集日志 - InfoPulse{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>采集日志</h2>
    <div>
        <select class="form-select d-inline-block w-auto me-2" id="sourceFilter">
            <option value="">所有采集源</option>
        </select>
        <select class="form-select d-inline-block w-auto me-2" id="statusFilter">
            <option value="">所有状态</option>
            <option value="success">成功</option>
            <option value="error">失败</option>
        </select>
        <button class="btn btn-primary" onclick="refreshLogs()">
            <i class="bi bi-arrow-clockwise me-2"></i>刷新
        </button>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>采集源</th>
                        <th>状态</th>
                        <th>消息</th>
                        <th>采集数量</th>
                        <th>耗时(秒)</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr>
                        <td colspan="6" class="text-center">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center" id="pagination">
            </ul>
        </nav>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;
    let pageSize = 50;
    let currentSource = '';
    let currentStatus = '';

    function refreshLogs() {
        currentSource = $('#sourceFilter').val();
        currentStatus = $('#statusFilter').val();
        loadLogs();
    }

    function loadLogs() {
        let url = `/api/logs?limit=500`;
        if (currentSource) {
            url += `&source_name=${currentSource}`;
        }

        $.get(url, function(logs) {
            let filteredLogs = logs;
            if (currentStatus) {
                filteredLogs = logs.filter(log => log.status === currentStatus);
            }

            const totalPages = Math.ceil(filteredLogs.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageLogs = filteredLogs.slice(startIndex, endIndex);

            let html = '';
            pageLogs.forEach(function(log) {
                const statusClass = log.status === 'success' ? 'bg-success' : 'bg-danger';
                const time = new Date(log.created_at).toLocaleString();
                
                html += `
                    <tr>
                        <td>${time}</td>
                        <td>${log.source_name}</td>
                        <td><span class="badge ${statusClass}">${log.status}</span></td>
                        <td>${log.message || '-'}</td>
                        <td>${log.crawl_count || 0}</td>
                        <td>${log.duration ? log.duration.toFixed(2) : '-'}</td>
                    </tr>
                `;
            });
            $('#logsTableBody').html(html || '<tr><td colspan="6" class="text-center">暂无日志</td></tr>');

            renderPagination(totalPages);
        });
    }

    function renderPagination(totalPages) {
        let html = '';
        
        if (totalPages <= 1) {
            $('#pagination').html('');
            return;
        }

        html += `
            <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="changePage(${currentPage - 1})">上一页</a>
            </li>
        `;

        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + 4);
        
        for (let i = startPage; i <= endPage; i++) {
            html += `
                <li class="page-item ${i === currentPage ? 'active' : ''}">
                    <a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
                </li>
            `;
        }

        html += `
            <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                <a class="page-link" href="#" onclick="changePage(${currentPage + 1})">下一页</a>
            </li>
        `;

        $('#pagination').html(html);
    }

    function changePage(page) {
        currentPage = page;
        loadLogs();
    }

    function loadSourceOptions() {
        $.get('/api/sources', function(sources) {
            let html = '<option value="">所有采集源</option>';
            sources.forEach(function(source) {
                html += `<option value="${source.name}">${source.name}</option>`;
            });
            $('#sourceFilter').html(html);
        });
    }

    $('#sourceFilter').change(function() {
        currentPage = 1;
        refreshLogs();
    });

    $('#statusFilter').change(function() {
        currentPage = 1;
        refreshLogs();
    });

    $(document).ready(function() {
        loadSourceOptions();
        loadLogs();
        setInterval(loadLogs, 10000);
    });
</script>
{% endblock %}
